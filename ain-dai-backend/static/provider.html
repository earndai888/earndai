<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เอิ้นได้ ฝั่งช่าง — รับงานใกล้บ้าน</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;500;600&family=Noto+Sans+Thai:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="phone">
<div class="debugbadge" id="debugbadge"></div>

<section class="screen on" id="loading"><div class="loadwrap">กำลังเชื่อมต่อ…</div></section>

<!-- ═══ สมัครเป็นช่าง ═══ -->
<section class="screen" id="preg">
  <div class="top"><div class="brand">เอิ้น<b>ได้</b> <small>ฝั่งช่าง</small></div></div>
  <div class="bubble" style="background:var(--navy)">
    <h1 id="preghead">สมัครเป็นช่างกับเอิ้นได้</h1>
    <p>รับงานใกล้บ้าน เลือกงานเองได้ เงินเข้าแน่นอนผ่านระบบ escrow</p>
  </div>
  <label class="f">ชื่อที่แสดงให้ลูกค้าเห็น *</label>
  <input class="inp" id="rname" placeholder="เช่น ช่างเอก รับเหมาไฟฟ้า" maxlength="60">
  <label class="f">เบอร์โทรศัพท์</label>
  <input class="inp" id="rphone" placeholder="08xxxxxxxx" inputmode="tel" maxlength="20">
  <label class="f">รับงานหมวดไหนบ้าง * (เลือกได้หลายหมวด)</label>
  <div class="chips" id="rcats"></div>
  <label class="f">รับงานตำบลไหนบ้าง * (เลือกได้หลายตำบล)</label>
  <div class="chips" id="rtambons"></div>
  <label class="f">แนะนำตัวสั้นๆ</label>
  <textarea class="ta" id="rbio" maxlength="300" placeholder="เช่น ประสบการณ์ 10 ปี เครื่องมือครบ เก็บงานเรียบร้อย"></textarea>
  <label class="f">เบอร์ PromptPay รับเงินค่าจ้าง</label>
  <input class="inp" id="rpromptpay" placeholder="เบอร์มือถือหรือเลขบัตรประชาชน" maxlength="20">
  <button class="btn" id="regbtn" onclick="register()">บันทึกข้อมูลช่าง</button>
  <div class="note">ระบบจะแบ่งรายได้ให้ช่าง 89% ของราคางาน (หักค่าระบบ 8% กองทุนชุมชน 2% ภาษี 1%)</div>
</section>

<!-- ═══ หน้าแรกช่าง ═══ -->
<section class="screen" id="phome">
  <div class="top">
    <div class="brand">เอิ้น<b>ได้</b> <small>ฝั่งช่าง</small></div>
  </div>
  <div class="card" id="pstats" style="background:var(--navy);color:#fff;border:none"></div>
  <div class="sect"><h2>งานของฉัน</h2></div>
  <div id="pminelist"><div class="note">—</div></div>
  <div class="sect"><h2>งานเปิดรับข้อเสนอในพื้นที่</h2>
    <a href="#" onclick="loadHome();return false" style="margin-left:auto;font-size:13px;color:var(--green-dark);text-decoration:none">⟳ รีเฟรช</a></div>
  <div id="popenlist"><div class="note">—</div></div>
</section>

<!-- ═══ งานที่ถูกเลือก ═══ -->
<section class="screen" id="pjob">
  <div class="pagehead"><button class="back" onclick="loadHome()">‹</button><h1>งานของฉัน</h1>
    <button class="back" style="margin-left:auto" title="รีเฟรช" onclick="openJob(state.jobId)">⟳</button></div>
  <div id="pjobbody"></div>
</section>

<!-- ═══ แถบล่าง ═══ -->
<nav class="nav" id="pnav" style="display:none">
  <button onclick="loadHome()">🔧<span class="navlbl">งานช่าง</span></button>
  <button onclick="editProfile()">👤<span class="navlbl">ข้อมูลช่าง</span></button>
</nav>

<script src="/static/common.js"></script>
<script>
const state = {me:null, jobId:null};
let workPhotos = [];

const short = n => ({'ตัดหญ้า-จัดสวน':'ตัดหญ้า','ซ่อมเครื่องใช้ไฟฟ้า':'ซ่อมไฟฟ้า','ช่างซ่อมทั่วไป':'ช่างซ่อม','บริการอื่นๆ':'อื่นๆ','ล้างแอร์/ซ่อมแอร์':'ล้างแอร์'}[n]||n);

/* ── boot ── */
(async function boot(){
  if(!await initAuth('Udemo-bird')) return;
  document.getElementById('rcats').innerHTML = META.categories.map(c=>
    `<button class="chip" data-slug="${c.slug}" onclick="this.classList.toggle('on')">${esc(short(c.name_th))}</button>`).join('');
  document.getElementById('rtambons').innerHTML = META.tambons.map(t=>
    `<button class="chip" data-id="${t.id}" onclick="this.classList.toggle('on')">ต.${esc(t.name)}</button>`).join('');
  await refreshMe();
  if(state.me.is_provider){
    document.getElementById('pnav').style.display='flex';
    loadHome();
  }else{
    prefillRegister();
    go('preg');
  }
})();

async function refreshMe(){ state.me = await api('/me'); }

function prefillRegister(){
  const me = state.me, p = me.provider;
  document.getElementById('preghead').textContent =
    me.is_provider ? 'แก้ไขข้อมูลช่าง' : 'สมัครเป็นช่างกับเอิ้นได้';
  document.getElementById('rname').value = me.display_name === 'ผู้ใช้ใหม่' ? '' : me.display_name;
  document.getElementById('rphone').value = me.phone || '';
  document.getElementById('rbio').value = p ? (p.bio || '') : '';
  document.getElementById('rpromptpay').value = p ? (p.promptpay_id || '') : '';
  const cats = p ? p.category_slugs : [];
  document.querySelectorAll('#rcats .chip').forEach(c=>c.classList.toggle('on', cats.includes(c.dataset.slug)));
  const tams = p ? p.tambon_coverage : [];
  document.querySelectorAll('#rtambons .chip').forEach(c=>c.classList.toggle('on', tams.includes(+c.dataset.id)));
}

function editProfile(){ prefillRegister(); go('preg'); }

async function register(){
  const name = document.getElementById('rname').value.trim();
  const cats = [...document.querySelectorAll('#rcats .chip.on')].map(c=>c.dataset.slug);
  const tams = [...document.querySelectorAll('#rtambons .chip.on')].map(c=>+c.dataset.id);
  if(name.length < 2) return alert('ใส่ชื่อที่แสดงให้ลูกค้าเห็นก่อนครับ');
  if(!cats.length) return alert('เลือกหมวดงานที่รับอย่างน้อย 1 หมวดครับ');
  if(!tams.length) return alert('เลือกตำบลที่รับงานอย่างน้อย 1 ตำบลครับ');
  const btn = document.getElementById('regbtn');
  btn.disabled = true; btn.textContent = 'กำลังบันทึก…';
  try{
    await api('/provider/register', {method:'POST', body:{
      display_name: name,
      phone: document.getElementById('rphone').value.trim() || null,
      bio: document.getElementById('rbio').value.trim() || null,
      promptpay_id: document.getElementById('rpromptpay').value.trim() || null,
      category_slugs: cats, tambon_ids: tams,
    }});
    await refreshMe();
    document.getElementById('pnav').style.display='flex';
    loadHome();
  }catch(e){ alert('บันทึกไม่สำเร็จ: '+e.message); }
  finally{ btn.disabled=false; btn.textContent='บันทึกข้อมูลช่าง'; }
}

/* ── หน้าแรกช่าง ── */
async function loadHome(){
  go('phome');
  const mine = document.getElementById('pminelist'), open = document.getElementById('popenlist');
  mine.innerHTML = open.innerHTML = '<div class="note">กำลังโหลด…</div>';
  try{
    const p = state.me.provider || {};
    const data = await api('/provider/jobs');
    document.getElementById('pstats').innerHTML =
      `<div style="font-family:'Mitr';font-size:16px">👷 ${esc(state.me.display_name)}
         ${p.verified?'<span class="tag">✓ ยืนยันตัวตน</span>':''}</div>
       <div style="font-size:12.5px;opacity:.85">★ ${(+(p.rating_avg||0)).toFixed(1)} (${p.rating_count||0} รีวิว) •
         ผลงาน ${p.jobs_done||0} งาน • งานเปิดรับ ${data.open.length} • งานที่ได้รับ ${data.mine.length}</div>`;
    mine.innerHTML = data.mine.length ? data.mine.map(j=>`
      <div class="card prov jobitem" onclick="openJob('${j.id}')">
        <div class="ava">${j.icon||'🔧'}</div>
        <div><div class="nm">${esc(j.title)}</div><div class="meta">ต.${esc(j.tambon_name)} • ${fmt(j.price)}฿</div></div>
        <div class="statuschip">${STATUS_TH[j.status]||j.status}</div>
      </div>`).join('') : '<div class="note">ยังไม่มีงานที่ถูกเลือก</div>';
    open.innerHTML = data.open.length ? data.open.map((j,i)=>`
      <div class="card">
        <div class="prov"><div class="ava">${j.icon||'🔧'}</div>
          <div><div class="nm">${esc(j.title)}</div>
          <div class="meta">ต.${esc(j.tambon_name)} • งบ ${j.budget_min?fmt(j.budget_min):'?'}–${j.budget_max?fmt(j.budget_max):'?'}฿ • ${esc(j.preferred_time||'')}</div></div>
          ${j.my_price?`<div class="tag orange">เสนอแล้ว ${fmt(j.my_price)}฿</div>`:''}
        </div>
        ${j.description?`<div class="msg" style="font-size:13px;color:var(--muted);margin-top:8px">"${esc(j.description)}"</div>`:''}
        ${j.voice_note_url?`<audio controls src="${j.voice_note_url}"></audio>`:''}
        ${j.photos&&j.photos.length?`<div class="thumbs" style="margin:8px 0 0">${j.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}
        <button class="btn sm ghost" onclick="document.getElementById('bf${i}').classList.toggle('on')">💰 ${j.my_price?'แก้ข้อเสนอ':'เสนอราคา'}</button>
        <div class="bidform" id="bf${i}">
          <input id="bfp${i}" placeholder="ราคา (บาท)" inputmode="numeric" value="${j.my_price?+j.my_price:''}">
          <input id="bfm${i}" placeholder="ข้อความถึงลูกค้า เช่น เครื่องมือพร้อม เก็บกวาดให้">
          <input id="bfa${i}" placeholder="ไปได้เมื่อไหร่ เช่น เสาร์ 8:00">
          <button class="btn sm" onclick="sendBid('${j.id}',${i},this)">ส่งข้อเสนอ</button>
        </div>
      </div>`).join('') : '<div class="note">ไม่มีงานเปิดรับข้อเสนอในพื้นที่/หมวดของคุณตอนนี้<br>ลองเพิ่มหมวดหรือตำบลที่รับงานในเมนู "ข้อมูลช่าง"</div>';
  }catch(e){
    mine.innerHTML = '';
    open.innerHTML = `<div class="note">โหลดไม่ได้: ${esc(e.message)}</div>`;
  }
}

async function sendBid(jobId, i, btn){
  const price = parseFloat(document.getElementById('bfp'+i).value);
  if(!price || price<=0) return alert('ใส่ราคาก่อนครับ');
  btn.disabled = true;
  try{
    await api(`/jobs/${jobId}/bids`, {method:'POST', body:{
      price, message: document.getElementById('bfm'+i).value.trim()||null,
      available_at: document.getElementById('bfa'+i).value.trim()||null}});
    loadHome();
  }catch(e){ alert('เสนอราคาไม่สำเร็จ: '+e.message); btn.disabled=false; }
}

/* ── งานที่ถูกเลือก ── */
async function openJob(id){
  state.jobId = id;
  const box = document.getElementById('pjobbody');
  go('pjob');
  box.innerHTML = '<div class="note">กำลังโหลด…</div>';
  try{
    const j = await api('/jobs/'+id);
    let html = `
      <div class="card"><div class="prov"><div class="ava">${j.icon||'🔧'}</div>
        <div><div class="nm">${esc(j.title)}</div>
        <div class="meta">ต.${esc(j.tambon_name)} • ${j.selected?fmt(j.selected.price)+'฿':''} • ${STATUS_TH[j.status]||j.status}</div></div></div>
        ${j.description?`<div class="msg" style="font-size:13px;color:var(--muted);margin-top:8px">"${esc(j.description)}"</div>`:''}
        ${j.voice_note_url?`<audio controls src="${j.voice_note_url}"></audio>`:''}
        ${j.photos&&j.photos.length?`<div class="thumbs" style="margin:8px 0 0">${j.photos.map(p=>`<img src="${p}">`).join('')}</div>`:''}
      </div>`;
    if(j.status==='assigned'){
      html += `
        <div class="escrow">🛡️ <span>ลูกค้าจ่ายเงินเข้า escrow แล้ว — ไปหน้างานแล้วขอรหัส 4 หลักจากลูกค้าเพื่อเริ่มงาน</span></div>
        <label class="f">กรอกรหัสเริ่มงานจากลูกค้า</label>
        <input class="inp" id="potp" maxlength="4" inputmode="numeric" placeholder="รหัส 4 หลัก" style="text-align:center;font-size:22px;letter-spacing:8px;font-family:'Mitr'">
        <button class="btn" onclick="startJob(this)">ยืนยันเริ่มงาน</button>`;
    }else if(j.status==='in_progress'){
      html += `
        <div class="escrow">🔨 <span>กำลังทำงาน — เสร็จแล้วถ่ายรูปผลงานแนบ แล้วกดส่งงาน</span></div>
        <div class="photo" onclick="document.getElementById('pphotoinput').click()">📷 แนบรูปผลงาน (แตะเพื่อเลือกรูป)</div>
        <input type="file" id="pphotoinput" accept="image/*" multiple style="display:none" onchange="addWorkPhotos(this.files)">
        <div class="thumbs" id="pworkthumbs"></div>
        <button class="btn" onclick="completeJob(this)">✅ ส่งงาน แจ้งลูกค้าตรวจ</button>`;
    }else if(j.status==='done'){
      html += `<div class="escrow warn">⏳ <span>ส่งงานแล้ว — รอลูกค้าตรวจและกดยืนยัน (ไม่กดภายใน 24 ชม. ระบบยืนยันอัตโนมัติ)</span></div>`;
    }else if(j.status==='confirmed'||j.status==='settled'){
      const s = j.settlement||{};
      html += `
        <div class="escrow">🎉 <span>ลูกค้ายืนยันแล้ว! เงินส่วนของคุณ <b>${s.provider_net?(+s.provider_net).toFixed(2):''}฿</b> ระบบจะโอนเข้า PromptPay ที่ลงทะเบียนไว้</span></div>
        ${j.review?`<div class="card center"><div style="font-family:'Mitr'">รีวิวจากลูกค้า</div>
          <div class="stars">${Array.from({length:j.review.rating},()=>'<span class="on">★</span>').join('')}</div>
          ${j.review.comment?`<div class="note">"${esc(j.review.comment)}"</div>`:''}</div>`:''}`;
    }
    box.innerHTML = html;
  }catch(e){ box.innerHTML = `<div class="note">โหลดไม่ได้: ${esc(e.message)}</div>`; }
}

async function addWorkPhotos(files){
  const box = document.getElementById('pworkthumbs');
  for(const f of files){
    try{
      const url = await uploadFile(f);
      workPhotos.push(url);
      box.innerHTML += `<img src="${url}" alt="รูปผลงาน">`;
    }catch(e){ alert('อัปโหลดรูปไม่สำเร็จ: '+e.message); }
  }
}
async function startJob(btn){
  const otp = document.getElementById('potp').value.trim();
  if(otp.length !== 4) return alert('กรอกรหัส 4 หลักจากลูกค้าก่อนครับ');
  btn.disabled = true;
  try{
    await api(`/jobs/${state.jobId}/start`, {method:'POST', body:{otp}});
    openJob(state.jobId);
  }catch(e){ alert(e.message); btn.disabled=false; }
}
async function completeJob(btn){
  btn.disabled = true; btn.textContent = 'กำลังส่งงาน…';
  try{
    await api(`/jobs/${state.jobId}/complete`, {method:'POST', body:{photos: workPhotos}});
    workPhotos = [];
    openJob(state.jobId);
  }catch(e){ alert(e.message); btn.disabled=false; btn.textContent='✅ ส่งงาน แจ้งลูกค้าตรวจ'; }
}
</script>
</div>
</body>
</html>
